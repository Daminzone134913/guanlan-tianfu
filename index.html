<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>观澜 · 东方天赋定位</title>

<style>
/* ===== CSS Reset & Variables ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-start: #0a0e27;
  --bg-mid: #141852;
  --bg-end: #1a0a3e;
  --glass-bg: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.12);
  --glass-shadow: rgba(0,0,0,0.3);
  --text-primary: #e8e6f0;
  --text-secondary: rgba(232,230,240,0.65);
  --text-muted: rgba(232,230,240,0.4);
  --accent-gold: #c9a96e;
  --accent-warm: #d4a574;
  --user-msg-bg: linear-gradient(135deg, rgba(139,92,246,0.35), rgba(59,130,246,0.25));
  --user-msg-border: rgba(139,92,246,0.3);
  --ai-msg-bg: rgba(255,255,255,0.05);
  --ai-msg-border: rgba(255,255,255,0.08);
  --progress-active: linear-gradient(90deg, #c9a96e, #d4a574);
  --input-bg: rgba(255,255,255,0.08);
  --font-serif: 'Songti SC', 'Songti SC', 'SimSun', serif;
  --font-sans: 'PingFang SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  font-family: var(--font-sans);
  color: var(--text-primary);
  background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-mid) 40%, var(--bg-end) 100%);
  -webkit-font-smoothing: antialiased;
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

/* ===== App Container ===== */
#app {
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  max-width: 680px;
  margin: 0 auto;
  position: relative;
  opacity: 0;
  transition: opacity 1.5s ease;
}
#app.visible { opacity: 1; }

/* ===== Header ===== */
.header {
  flex-shrink: 0;
  padding: 16px 20px 12px;
  text-align: center;
  position: relative;
  z-index: 10;
  background: linear-gradient(180deg, rgba(10,14,39,0.9) 0%, transparent 100%);
}
.header-title {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 600;
  color: var(--accent-gold);
  letter-spacing: 4px;
  margin-bottom: 12px;
}
.header-subtitle {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 2px;
  margin-bottom: 14px;
}

/* Progress Bar */
.progress-container {
  display: flex; align-items: center; gap: 4px;
  padding: 0 8px;
}
.progress-step {
  flex: 1; height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
  transition: all 0.6s ease;
  position: relative;
}
.progress-step .fill {
  position: absolute; left: 0; top: 0; height: 100%;
  width: 0%; border-radius: 2px;
  background: var(--progress-active);
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.progress-step.active .fill { width: 100%; }
.progress-step.current .fill {
  width: 50%;
  animation: progressPulse 2s ease-in-out infinite;
}
@keyframes progressPulse {
  0%, 100% { width: 30%; opacity: 0.7; }
  50% { width: 70%; opacity: 1; }
}
.stage-labels {
  display: flex; justify-content: space-between;
  padding: 6px 8px 0;
}
.stage-label {
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 1px;
  transition: color 0.4s;
  text-align: center;
  flex: 1;
}
.stage-label.active { color: var(--accent-gold); }

/* ===== Chat Area ===== */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
.chat-area-inner {
  display: flex; flex-direction: column;
  gap: 16px;
  min-height: 100%;
  justify-content: flex-end;
}

/* Messages */
.msg {
  max-width: 88%;
  animation: msgIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  line-height: 1.85;
  font-size: 15px;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.ai {
  align-self: flex-start;
  background: var(--ai-msg-bg);
  border: 1px solid var(--ai-msg-border);
  border-radius: 4px 18px 18px 18px;
  padding: 16px 20px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  font-family: var(--font-serif);
  color: var(--text-primary);
  position: relative;
}
.msg.ai::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  border-radius: inherit;
  background: radial-gradient(ellipse at top left, rgba(201,169,110,0.06), transparent 70%);
  pointer-events: none;
}

.msg.user {
  align-self: flex-end;
  background: var(--user-msg-bg);
  border: 1px solid var(--user-msg-border);
  border-radius: 18px 4px 18px 18px;
  padding: 14px 18px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--text-primary);
}

.msg.summary-card {
  align-self: center;
  max-width: 92%;
  width: 100%;
  background: linear-gradient(135deg, rgba(201,169,110,0.1), rgba(139,92,246,0.08));
  border: 1px solid rgba(201,169,110,0.2);
  border-radius: 12px;
  padding: 20px 24px;
  text-align: center;
  font-family: var(--font-serif);
  position: relative;
  overflow: hidden;
}
.msg.summary-card::before {
  content: '';
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 40px; height: 2px;
  background: var(--accent-gold);
  border-radius: 1px;
}
.msg.summary-card .summary-title {
  font-size: 13px;
  color: var(--accent-gold);
  letter-spacing: 3px;
  margin-bottom: 12px;
  font-weight: 500;
}
.msg.summary-card .summary-text {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 2;
}

/* Typing cursor */
.typing-cursor {
  display: inline-block;
  width: 2px; height: 1em;
  background: var(--accent-gold);
  margin-left: 2px;
  animation: blink 0.8s step-end infinite;
  vertical-align: text-bottom;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Thinking animation */
.thinking {
  align-self: flex-start;
  display: flex; gap: 6px; align-items: center;
  padding: 16px 24px;
  background: var(--ai-msg-bg);
  border: 1px solid var(--ai-msg-border);
  border-radius: 4px 18px 18px 18px;
  backdrop-filter: blur(12px);
  animation: msgIn 0.3s ease both;
}
.thinking .dot {
  width: 6px; height: 6px;
  background: var(--accent-gold);
  border-radius: 50%;
  animation: thinkDot 1.4s ease-in-out infinite;
}
.thinking .dot:nth-child(2) { animation-delay: 0.2s; }
.thinking .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes thinkDot {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}

/* ===== Report Styles ===== */
.report-container {
  align-self: center;
  max-width: 95%;
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 28px 24px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  animation: reportIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  margin: 8px 0;
}
@keyframes reportIn {
  from { opacity: 0; transform: scale(0.95) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.report-container h1 {
  font-family: var(--font-serif);
  font-size: 22px;
  color: var(--accent-gold);
  text-align: center;
  letter-spacing: 4px;
  margin-bottom: 6px;
  font-weight: 600;
}
.report-container .report-sub {
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 2px;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.report-container h2 {
  font-family: var(--font-serif);
  font-size: 16px;
  color: var(--accent-warm);
  margin: 24px 0 12px;
  padding-left: 12px;
  border-left: 2px solid var(--accent-gold);
  letter-spacing: 2px;
  font-weight: 500;
}
.report-container h3 {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--text-primary);
  margin: 16px 0 8px;
  font-weight: 500;
}
.report-container p {
  font-size: 14px;
  line-height: 2;
  color: var(--text-secondary);
  margin-bottom: 10px;
  text-align: justify;
}
.report-container ul {
  padding-left: 18px;
  margin: 8px 0 12px;
}
.report-container li {
  font-size: 14px;
  line-height: 2;
  color: var(--text-secondary);
  list-style: none;
  position: relative;
  padding-left: 14px;
}
.report-container li::before {
  content: '·';
  position: absolute; left: 0;
  color: var(--accent-gold);
  font-weight: bold;
}
.report-container strong {
  color: var(--text-primary);
  font-weight: 500;
}
.report-container blockquote {
  border-left: 2px solid rgba(201,169,110,0.3);
  padding: 8px 16px;
  margin: 12px 0;
  background: rgba(201,169,110,0.05);
  border-radius: 0 8px 8px 0;
  font-style: italic;
  color: var(--text-secondary);
  font-size: 14px;
  line-height: 1.9;
}
.report-container hr {
  border: none;
  height: 1px;
  background: rgba(255,255,255,0.06);
  margin: 20px 0;
}
.report-container .report-divider {
  text-align: center;
  color: var(--accent-gold);
  font-size: 12px;
  letter-spacing: 8px;
  margin: 20px 0;
  opacity: 0.5;
}

.download-btn {
  display: block;
  margin: 24px auto 8px;
  padding: 12px 36px;
  background: linear-gradient(135deg, rgba(201,169,110,0.25), rgba(201,169,110,0.1));
  border: 1px solid rgba(201,169,110,0.3);
  border-radius: 24px;
  color: var(--accent-gold);
  font-family: var(--font-serif);
  font-size: 14px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s ease;
}
.download-btn:hover, .download-btn:active {
  background: linear-gradient(135deg, rgba(201,169,110,0.35), rgba(201,169,110,0.2));
  transform: translateY(-1px);
}

/* ===== Modal Styles ===== */
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.9) translateY(30px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

/* ===== Report Styles ===== */
.report-preview-section {
  position: relative;
}
.report-preview-section.locked {
  max-height: 500px;
  overflow: hidden;
}
.report-preview-section.locked::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 160px;
  background: linear-gradient(0deg,
    rgba(14,16,42,0.98) 0%,
    rgba(14,16,42,0.85) 30%,
    rgba(14,16,42,0.5) 60%,
    transparent 100%);
  pointer-events: none;
}
.unlock-cta {
  text-align: center;
  padding: 24px 16px 12px;
  position: relative;
  z-index: 2;
}
.unlock-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 32px;
  background: linear-gradient(135deg, rgba(201,169,110,0.3), rgba(201,169,110,0.12));
  border: 1px solid rgba(201,169,110,0.35);
  border-radius: 28px;
  color: var(--accent-gold);
  font-family: var(--font-serif);
  font-size: 15px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s ease;
  animation: ctaGlow 3s ease-in-out infinite;
}
@keyframes ctaGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(201,169,110,0); }
  50% { box-shadow: 0 0 24px 2px rgba(201,169,110,0.12); }
}
.unlock-btn:hover, .unlock-btn:active {
  background: linear-gradient(135deg, rgba(201,169,110,0.45), rgba(201,169,110,0.2));
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(201,169,110,0.18);
}
.unlock-btn .arrow {
  transition: transform 0.3s;
}
.unlock-btn:hover .arrow {
  transform: translateX(3px);
}
.unlock-hint {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 10px;
  letter-spacing: 1px;
}

/* Locked sections */
.report-locked-section {
  opacity: 0.3;
  pointer-events: none;
  position: relative;
}
.report-locked-section h2,
.report-locked-section h3 {
  color: var(--text-muted) !important;
}
.report-locked-section p,
.report-locked-section blockquote {
  color: rgba(232,230,240,0.2) !important;
  filter: blur(2px);
  user-select: none;
}

/* ===== Input Area ===== */
.input-area {
  flex-shrink: 0;
  padding: 12px 16px;
  padding-bottom: calc(12px + var(--safe-bottom));
  background: linear-gradient(0deg, rgba(10,14,39,0.95) 0%, rgba(10,14,39,0.8) 70%, transparent 100%);
  position: relative;
  z-index: 10;
}
.input-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  max-width: 680px;
  margin: 0 auto;
}
.input-wrapper {
  flex: 1;
  position: relative;
}
.input-wrapper textarea {
  width: 100%;
  min-height: 44px;
  max-height: 120px;
  padding: 12px 16px;
  background: var(--input-bg);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 22px;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.5;
  resize: none;
  outline: none;
  transition: border-color 0.3s;
  overflow-y: auto;
}
.input-wrapper textarea::placeholder {
  color: var(--text-muted);
}
.input-wrapper textarea:focus {
  border-color: rgba(201,169,110,0.3);
}

.send-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, rgba(201,169,110,0.3), rgba(139,92,246,0.2));
  color: var(--accent-gold);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s ease;
  flex-shrink: 0;
}
.send-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
.send-btn:not(:disabled):hover {
  transform: scale(1.05);
  background: linear-gradient(135deg, rgba(201,169,110,0.45), rgba(139,92,246,0.3));
}

.mic-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
  background: var(--input-bg);
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s ease;
  flex-shrink: 0;
  position: relative;
  -webkit-user-select: none;
  user-select: none;
}
.mic-btn.recording {
  background: rgba(239,68,68,0.2);
  border-color: rgba(239,68,68,0.4);
  color: #ef4444;
  animation: micPulse 1.5s ease infinite;
}
@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.3); }
  50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
}
.mic-btn.unsupported {
  opacity: 0.3;
  cursor: not-allowed;
}

.interim-text {
  position: absolute;
  bottom: 100%;
  left: 0; right: 0;
  padding: 6px 16px;
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
}

/* ===== Loading overlay for report ===== */
.loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(10,14,39,0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.5s ease;
}
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}
.loading-overlay .lotus {
  width: 60px; height: 60px;
  animation: lotusSpin 3s linear infinite;
}
@keyframes lotusSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.loading-overlay .loading-text {
  margin-top: 24px;
  font-family: var(--font-serif);
  font-size: 15px;
  color: var(--text-secondary);
  letter-spacing: 3px;
  animation: loadingPulse 2s ease-in-out infinite;
}
@keyframes loadingPulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* ===== Background Particles ===== */
.bg-particles {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}
.particle {
  position: absolute;
  width: 2px; height: 2px;
  background: rgba(201,169,110,0.15);
  border-radius: 50%;
  animation: float linear infinite;
}
@keyframes float {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* ===== Responsive ===== */
@media (max-width: 480px) {
  .header { padding: 12px 14px 8px; }
  .header-title { font-size: 16px; letter-spacing: 3px; }
  .header-subtitle { font-size: 10px; }
  .chat-area { padding: 16px 12px; }
  .msg { max-width: 92%; font-size: 14px; }
  .msg.ai { padding: 14px 16px; }
  .msg.user { padding: 12px 16px; }
  .report-container { padding: 20px 16px; }
  .report-container h1 { font-size: 19px; }
  .report-container h2 { font-size: 15px; }
  .stage-label { font-size: 8px; }
  .input-area { padding: 10px 12px; padding-bottom: calc(10px + var(--safe-bottom)); }
}
@media (min-width: 681px) {
  .chat-area { padding: 24px 24px; }
  .msg.ai { padding: 20px 24px; }
}
/* Enhanced Mic Button */
.mic-btn-enhanced {
  flex-shrink: 0;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: 2px solid var(--accent-gold);
  background: linear-gradient(135deg, rgba(201,169,110,0.2), rgba(212,165,116,0.15));
  color: var(--accent-gold);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  position: relative;
  box-shadow: 0 4px 15px rgba(201,169,110,0.3);
}
.mic-btn-enhanced:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(201,169,110,0.4);
}
.mic-btn-enhanced.recording {
  background: linear-gradient(135deg, rgba(239,68,68,0.3), rgba(220,38,38,0.2));
  border-color: #ef4444;
  color: #ef4444;
  animation: pulse-recording 1.5s ease-in-out infinite;
}
@keyframes pulse-recording {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}
.mic-btn-enhanced.unsupported {
  opacity: 0.3;
  cursor: not-allowed;
}
</style>

<body>

<!-- Background Particles -->
<div class="bg-particles" id="bgParticles"></div>

<!-- Main App -->
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-title">观 澜</div>
    <div class="header-subtitle">东方天赋定位</div>
    <div class="progress-container" id="progressBar">
      <div class="progress-step" data-stage="0"><div class="fill"></div></div>
      <div class="progress-step" data-stage="1"><div class="fill"></div></div>
      <div class="progress-step" data-stage="2"><div class="fill"></div></div>
      <div class="progress-step" data-stage="3"><div class="fill"></div></div>
      <div class="progress-step" data-stage="4"><div class="fill"></div></div>
      <div class="progress-step" data-stage="5"><div class="fill"></div></div>
    </div>
    <div class="stage-labels">
      <div class="stage-label" data-stage="0">暖场</div>
      <div class="stage-label" data-stage="1">观流</div>
      <div class="stage-label" data-stage="2">溯源</div>
      <div class="stage-label" data-stage="3">观照</div>
      <div class="stage-label" data-stage="4">定位</div>
      <div class="stage-label" data-stage="5">报告</div>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chatArea">
    <div class="chat-area-inner" id="chatInner"></div>
  </div>

  <!-- Input Area -->
  <div class="input-area" id="inputArea">
    <div class="input-row">

<script>
// ===== 全局状态 =====
const APP_STATE = {
  currentStage: -1,       // -1=未开始, 0=暖场, 1=观流, 2=溯源, 3=观照, 4=定位, 5=报告
  currentQuestion: -1,    // 当前问题在当前阶段的索引

  waitingForStart: false, // 等待用户说"准备好了"
  isTyping: false,        // 正在打字动画中
  isProcessing: false,    // 正在处理过渡
  reportGenerated: false,
  unlocked: true,         // 始终显示完整报告
};

// ===== 对话流程定义 =====
const STAGES = [
  {

  {
    id: 1, name: '观流', label: '观流 · 能量流向',

    questions: [

      { key: 'q4', text: "做这些事的时候，有没有什么时候特别有劲——不觉得累、不觉得烦？什么情况下又会觉得'怎么还没做完'？" },

  },
  {
    id: 2, name: '溯源', label: '溯源 · 痛苦即入口',
    transition: "前面我们聊了你投入精力的地方。现在换一个角度——聊聊那些让你不舒服的、想改变的东西。有时候天赋不在你喜欢的事里，而在你受不了的事里。",
    questions: [
      { key: 'q8', text: '过去一年，最让你消耗的不是体力、而是心的事情是什么？做完之后心里空落落的那种。' },

      { key: 'q10', text: '如果你这辈子只能帮一大群人解决一个问题，你会选哪个？不是因为最赚钱，而是因为你经历过、你懂。' },
      { key: 'q11', text: '你见过哪些人在走一条明显有问题的路，你一眼就能看到漏洞，但他们浑然不觉？' },
      { key: 'q12', text: "你觉得'为什么是我来解决这个问题'？你的什么独特经历让你比任何人都更懂？" },

  },

    transition: "前面我们聊了你在做什么、你受不了什么。现在聊一个更根本的问题——你是谁。不是你的职业、你的公司、你的头衔——是剥掉所有这些之后，那个还在的东西。",
    questions: [

      { key: 'q15', text: "你最不想成为什么样的人？不是失败的人，而是哪种活法、哪种状态，你打心底拒绝？" },
      { key: 'q16', text: '如果全世界只能听到你说一句话，你会说什么？' },
      { key: 'q17', text: "有没有什么事，别人觉得很难，但你觉得像呼吸一样自然？" },
    ]
  },
  {
    id: 4, name: '定位', label: '定位 · 道器合一',
    transition: "好，我们聊了很多了。现在把这些汇聚一下——看看你的天赋指向什么方向。",
    questions: [
      { key: 'q18', text: "综合我们聊的所有内容，如果只用一句话说'我的核心天赋是什么'——你会怎么说？" },
      { key: 'q19', text: '你的天赋在什么环境下会发光？什么环境下会枯萎？' },
      { key: 'q20', text: '你的天赋最能帮到哪类人？说具体——多大、什么状态、困惑什么？' },
      { key: 'q21', text: '如果这周就要启动——不是宏大计划，就是这周——你的最小切口是什么？' },

// ===== 开场白 =====
const OPENING = `你好。欢迎来到「观澜」。

接下来八十一分钟——取经路上有八十一难，认识自己也一样——我们聊聊天。
不是测试，不是分析，就是聊聊。聊着聊着，你可能会看见一些平时没注意到的东西。

我会问你一些问题。有的很好回答，有的需要想一想。不用想太久，第一反应往往最准。也没有标准答案——这里只有真不真，没有对不对。

准备好了，就告诉我。`;

// ===== DOM Elements =====
const app = document.getElementById('app');
const chatArea = document.getElementById('chatArea');
const chatInner = document.getElementById('chatInner');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const interimText = document.getElementById('interimText');
const progressBar = document.getElementById('progressBar');

// ===== 初始化 =====
function init() {
  createParticles();
  setupInputHandlers();
  setupVoiceInput();
  loadProgress();

  // 3秒渐入
  setTimeout(() => {
    app.classList.add('visible');
    // 如果无保存进度，显示开场白
    if (APP_STATE.currentStage === -1 && Object.keys(APP_STATE.answers).length === 0) {
      showOpening();
    } else {
      // 恢复进度
      restoreProgress();
    }
  }, 300);
}

// ===== 背景粒子 =====
function createParticles() {
  const container = document.getElementById('bgParticles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    container.appendChild(p);
  }
}

// ===== 输入框处理 =====
function setupInputHandlers() {
  userInput.addEventListener('input', () => {
    sendBtn.disabled = userInput.value.trim() === '';
    // 自动调整高度
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  });

  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) handleSend();
    }
  });

  sendBtn.addEventListener('click', handleSend);
}

// ===== 发送消息 =====
function handleSend() {
  const text = userInput.value.trim();
  if (!text || APP_STATE.isTyping || APP_STATE.isProcessing) return;

  // 添加用户消息
  addUserMessage(text);
  userInput.value = '';
  userInput.style.height = 'auto';
  sendBtn.disabled = true;

  // 处理回答
  processAnswer(text);
}

// ===== 添加消息到界面 =====
function addUserMessage(text) {
  const el = document.createElement('div');
  el.className = 'msg user';
  el.textContent = text;
  chatInner.appendChild(el);
  scrollToBottom();
}

function addAIMessage(text, callback) {
  const el = document.createElement('div');
  el.className = 'msg ai';
  chatInner.appendChild(el);
  APP_STATE.isTyping = true;

  typewriterEffect(el, text, () => {
    APP_STATE.isTyping = false;
    scrollToBottom();
    if (callback) callback();
  });
  scrollToBottom();
}

function addSummaryCard(title, text) {
  const el = document.createElement('div');
  el.className = 'msg summary-card';
  el.innerHTML = `<div class="summary-title">${title}</div><div class="summary-text">${text}</div>`;
  chatInner.appendChild(el);
  scrollToBottom();
}

function showThinking(callback) {
  const el = document.createElement('div');
  el.className = 'thinking';
  el.id = 'thinkingEl';
  el.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chatInner.appendChild(el);
  scrollToBottom();

  setTimeout(() => {
    el.remove();
    if (callback) callback();
  }, 1200 + Math.random() * 800);
}

// ===== 打字机效果 =====
function typewriterEffect(element, text, onComplete) {
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'typing-cursor';
  element.appendChild(cursor);

  const speed = Math.max(20, Math.min(50, 3000 / text.length));

  function type() {
    if (i < text.length) {
      const char = text.charAt(i);
      if (char === '\n') {
        element.insertBefore(document.createElement('br'), cursor);
      } else {
        element.insertBefore(document.createTextNode(char), cursor);
      }
      i++;
      scrollToBottom();
      setTimeout(type, speed);
    } else {
      cursor.remove();
      if (onComplete) onComplete();
    }
  }
  type();
}

// ===== 滚动到底部 =====
function scrollToBottom() {
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

// ===== 进度条更新 =====
function updateProgress(stage, total) {
  const steps = progressBar.querySelectorAll('.progress-step');
  const labels = document.querySelectorAll('.stage-label');

  steps.forEach((step, idx) => {
    step.classList.remove('active', 'current');
    if (idx < stage) step.classList.add('active');
    else if (idx === stage) step.classList.add('current');
  });

  labels.forEach((label, idx) => {
    label.classList.toggle('active', idx <= stage);
  });
}

// ===== 对话流程控制 =====
function showOpening() {
  APP_STATE.waitingForStart = true;
  APP_STATE.currentStage = -1;
  addAIMessage(OPENING);
  saveProgress();
}

function processAnswer(text) {
  // 等待开始状态
  if (APP_STATE.waitingForStart) {
    APP_STATE.waitingForStart = false;
    APP_STATE.currentStage = 0;
    APP_STATE.currentQuestion = 0;
    updateProgress(0);
    saveProgress();

    showThinking(() => {
      addAIMessage(STAGES[0].transition, () => {
        setTimeout(() => askQuestion(0, 0), 600);
      });
    });
    return;
  }

  // 保存答案
  const stage = STAGES[APP_STATE.currentStage];
  const question = stage.questions[APP_STATE.currentQuestion];
  APP_STATE.answers[question.key] = text;
  saveProgress();

  APP_STATE.isProcessing = true;

  showThinking(() => {
    APP_STATE.isProcessing = false;
    const nextQ = APP_STATE.currentQuestion + 1;

    if (nextQ < stage.questions.length) {
      // 还有问题
      APP_STATE.currentQuestion = nextQ;
      saveProgress();
      askQuestion(APP_STATE.currentStage, nextQ);
    } else {
      // 阶段结束，生成小结
      generateStageSummary(APP_STATE.currentStage);
    }
  });
}

function askQuestion(stageIdx, qIdx) {
  const question = STAGES[stageIdx].questions[qIdx];
  addAIMessage(question.text);
}

function generateStageSummary(stageIdx) {
  const stage = STAGES[stageIdx];
  // 收集该阶段所有答案的关键词
  const answerTexts = stage.questions.map(q => APP_STATE.answers[q.key] || '');
  const summary = createSummary(stage, answerTexts);

  addSummaryCard(`${stage.label} · 小结`, summary);
  saveProgress();

  // 进入下一阶段
  setTimeout(() => {
    const nextStage = stageIdx + 1;
    if (nextStage < STAGES.length) {
      APP_STATE.currentStage = nextStage;
      APP_STATE.currentQuestion = 0;
      updateProgress(nextStage);
      saveProgress();

      showThinking(() => {
        addAIMessage(STAGES[nextStage].transition, () => {
          setTimeout(() => askQuestion(nextStage, 0), 600);
        });
      });
    } else {
      // 所有阶段完成，生成报告
      APP_STATE.currentStage = 5;
      updateProgress(5);
      saveProgress();
      generateReport();
    }
  }, 2000);
}

// ===== 生成阶段小结 =====
function createSummary(stage, answers) {
  const combined = answers.join('');
  // 提取一些有意义的短句作为关键词提示
  const summaries = {
    0: extractWarmupSummary(answers),
    1: extractFlowSummary(answers),
    2: extractPainSummary(answers),
    3: extractIdentitySummary(answers),
    4: extractPositioningSummary(answers),
  };
  return summaries[stage.id] || combined.slice(0, 100);
}

function extractWarmupSummary(answers) {
  const [a1, a2] = answers;
  return `你在「${extractKeywords(a1, 8)}」中找到了忘我的心流状态，而理想的一天你想留给「${extractKeywords(a2, 8)}」。这些线索指向你内心真正渴望的空间。接下来，让我们看看更大的画面。`;
}

function extractFlowSummary(answers) {
  const kws = answers.map(a => extractKeywords(a, 6)).filter(Boolean).slice(0, 3);
  return `你的能量流向${kws.join('、')}这些方向。你在${extractKeywords(answers[1] || '', 6)}时最有力量，而在${extractKeywords(answers[3] || '', 6)}时感到消耗。你身边的人反复因为${extractKeywords(answers[2] || '', 6)}找到你。这条脉络正在清晰。`;
}

function extractPainSummary(answers) {
  return `你的痛苦地图逐渐清晰——日常消耗在「${extractKeywords(answers[0] || '', 8)}」，最深的经历是「${extractKeywords(answers[1] || '', 8)}」，而你想帮人解决的，是「${extractKeywords(answers[2] || '', 8)}」。痛苦不是天赋的反面，而是天赋的另一种表达方式。让我们继续向内看。`;
}

function extractIdentitySummary(answers) {
  return `剥掉所有标签后，你看见的核心是「${extractKeywords(answers[0] || '', 10)}」。你仰望的人身上有「${extractKeywords(answers[1] || '', 8)}」的品质，而你坚决拒绝的活法是「${extractKeywords(answers[2] || '', 8)}」。那个最核心的你，正在浮现。让我们把这一切汇聚。`;
}

function extractPositioningSummary(answers) {
  return `你的核心天赋指向「${extractKeywords(answers[0] || '', 12)}」，在「${extractKeywords(answers[1] || '', 8)}」的环境中发光，最能帮助「${extractKeywords(answers[2] || '', 10)}」。而你的第一步，是「${extractKeywords(answers[3] || '', 10)}」。方向已经清晰。现在，让我为你整理一份完整的报告。`;
}

function extractKeywords(text, maxLen) {
  if (!text) return '……';
  // 简单提取：取最核心的片段
  const trimmed = text.replace(/\s+/g, ' ').trim();
  if (trimmed.length <= maxLen) return trimmed;
  // 尝试提取引号内的内容
  const quoted = trimmed.match(/[「『""''](.*?)[」』""'']/);
  if (quoted) return quoted[1].slice(0, maxLen);
  return trimmed.slice(0, maxLen) + '……';
}

// ===== 报告生成 =====
function generateReport() {
  // 显示加载动画
  const overlay = document.createElement('div');

// ===== 构建完整报告HTML =====
function buildFullReportHTML(report) {
  let html = '';
  html += `<h1>${report.title}</h1>`;
  html += `<div class="report-sub">${report.subtitle}</div>`;

  for (const section of report.sections) {
    switch (section.type) {
      case 'h2':
        html += `<h2>${section.text}</h2>`;
        break;
      case 'h3':
        html += `<h3>${section.text}</h3>`;
        break;
      case 'paragraph':
        html += `<p>${section.text.replace(/\n/g, '<br>')}</p>`;
        break;
      case 'blockquote':
        html += `<blockquote>${section.text}</blockquote>`;
        break;
      case 'divider':
        html += '<div class="report-divider">◆ ◆ ◆</div>';
        break;
    }
  }
  return html;
}

function displayFullReport(report) {
  const container = document.createElement('div');
  container.className = 'report-container';
  container.id = 'reportContainer';

  let html = buildFullReportHTML(report);
  html += `<button class="download-btn" onclick="downloadReport()">下载完整报告</button>`;

  container.innerHTML = html;
  chatInner.appendChild(container);
  scrollToBottom();

  window._reportMarkdown = buildMarkdownReport(report);
}

// ===== 构建Markdown报告 =====
function buildMarkdownReport(report) {
  let md = `# ${report.title}\n\n`;
  md += `> ${report.subtitle}\n\n---\n\n`;

  for (const section of report.sections) {
    switch (section.type) {
      case 'h2': md += `## ${section.text}\n\n`; break;
      case 'h3': md += `### ${section.text}\n\n`; break;
      case 'paragraph': md += `${section.text}\n\n`; break;
      case 'blockquote': md += `> ${section.text}\n\n`; break;
      case 'divider': md += `---\n\n`; break;
    }
  }
  return md;
}

// ===== 下载报告 =====
function downloadReport() {
  const md = window._reportMarkdown || '';
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `观澜_天赋定位报告_${new Date().toISOString().slice(0,10)}.md`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

// ===== 语音输入 =====
function setupVoiceInput() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    console.warn('[语音] 当前浏览器不支持Web Speech API');
    micBtn.classList.add('unsupported');
    micBtn.title = '当前浏览器/微信版本不支持语音识别';
    micBtn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
    
    // 显示提示信息
    setTimeout(() => {
      alert('💡 提示：当前浏览器不支持语音输入\n\n建议：\n1. 使用Chrome浏览器\n2. 或升级微信到最新版本\n3. 或直接输入文字');
    }, 500);
    return;
  }
  
  console.log('[语音] Web Speech API 可用');

  const recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.continuous = true;  // 持续录音，直到手动停止
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  let isRecording = false;

  function startRecording(e) {
    e.preventDefault();
    if (APP_STATE.isTyping || APP_STATE.isProcessing) return;
    isRecording = true;
    micBtn.classList.add('recording');
    
    // 显示录音状态
    const statusEl = micBtn.querySelector('.mic-status');
    if (statusEl) statusEl.style.display = 'block';
    
    interimText.style.display = 'block';
    interimText.textContent = '🎤 正在聆听，请说话……（再次点击按钮结束）';
    console.log('[语音] 开始录音');

    try {
      recognition.start();
    } catch (err) {
      // 已经在运行
    }
  }

  function stopRecording(e) {
    e.preventDefault();
    if (!isRecording) return;
    isRecording = false;
    micBtn.classList.remove('recording');
    
    // 隐藏录音状态
    const statusEl = micBtn.querySelector('.mic-status');
    if (statusEl) statusEl.style.display = 'none';

    interimText.textContent = '⏳ 正在识别，请稍候……';
    console.log('[语音] 停止录音，等待识别结果');

    try {
      recognition.stop();
    } catch (err) {}
    
    setTimeout(() => {
      interimText.style.display = 'none';
      interimText.textContent = '';
    }, 2000);
  }

  recognition.onresult = (event) => {
    let interim = '';
    let final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        final += transcript;
      } else {
        interim += transcript;
      }
    }

    if (interim) {
      interimText.textContent = '🎤 ' + interim;
      console.log('[语音] 临时结果:', interim);
    }
    if (final) {
      console.log('[语音] 最终结果:', final);
      userInput.value = (userInput.value + final).trim();
      sendBtn.disabled = userInput.value.trim() === '';
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
      interimText.textContent = '✅ 识别完成：' + final;
      
      // 2秒后自动发送，给用户确认时间
      setTimeout(() => {
        if (userInput.value.trim()) {
          console.log('[语音] 自动发送');
          sendBtn.click();
        }
      }, 2000);
    }
  };

  recognition.onerror = (event) => {
    console.warn('Speech recognition error:', event.error);
    isRecording = false;
    micBtn.classList.remove('recording');
    
    // 隐藏录音状态
    const statusEl = micBtn.querySelector('.mic-status');
    if (statusEl) statusEl.style.display = 'none';
    
    if (event.error === 'not-allowed') {
      interimText.textContent = '❌ 请允许麦克风权限（点击地址栏左侧图标）';
      console.error('[语音] 麦克风权限被拒绝');
    } else if (event.error === 'no-speech') {
      interimText.textContent = '🔇 没有检测到语音，请重试';
    } else {
      interimText.textContent = '⚠️ 识别失败，请手动输入或重试';
    }
    setTimeout(() => {
      interimText.style.display = 'none';
      interimText.textContent = '';
    }, 3000);
  };

  recognition.onend = () => {
    isRecording = false;
    micBtn.classList.remove('recording');
    
    // 隐藏录音状态
    const statusEl = micBtn.querySelector('.mic-status');
    if (statusEl) statusEl.style.display = 'none';
    
    setTimeout(() => {
      if (interimText.textContent && !interimText.textContent.includes('✅') && !interimText.textContent.includes('❌')) {
        interimText.style.display = 'none';
        interimText.textContent = '';
      }
    }, 2000);
  };

  // Click to toggle recording (点击切换模式)
  micBtn.addEventListener('click', (e) => {
    e.preventDefault();
    if (APP_STATE.isTyping || APP_STATE.isProcessing) return;
    
    if (isRecording) {
      stopRecording(e);
    } else {
      startRecording(e);
    }
  });

  // Also support touch for mobile
  micBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    // 不做任何事，等click事件处理
  }, { passive: false });
}

// ===== 进度持久化 =====
function saveProgress() {
  const state = {
    currentStage: APP_STATE.currentStage,
    currentQuestion: APP_STATE.currentQuestion,
    answers: APP_STATE.answers,
    waitingForStart: APP_STATE.waitingForStart,
    reportGenerated: APP_STATE.reportGenerated,
    unlocked: true,
    timestamp: Date.now()
  };
  try {
    localStorage.setItem('guanlan_progress', JSON.stringify(state));
  } catch (e) {}
}

function loadProgress() {
  try {
    const saved = localStorage.getItem('guanlan_progress');
    if (!saved) return;

    const state = JSON.parse(saved);
    // 检查是否在7天内
    if (Date.now() - state.timestamp > 7 * 24 * 60 * 60 * 1000) {
      localStorage.removeItem('guanlan_progress');
      return;
    }

    APP_STATE.currentStage = state.currentStage;
    APP_STATE.currentQuestion = state.currentQuestion;
    APP_STATE.answers = state.answers || {};
    APP_STATE.waitingForStart = state.waitingForStart || false;
    APP_STATE.reportGenerated = state.reportGenerated || false;
    APP_STATE.unlocked = true;
  } catch (e) {
    localStorage.removeItem('guanlan_progress');
  }
}

function restoreProgress() {
  const { currentStage, currentQuestion, answers, waitingForStart, reportGenerated } = APP_STATE;

  if (waitingForStart) {
    showOpening();
    return;
  }

  if (currentStage >= 0 && currentStage < STAGES.length) {
    updateProgress(currentStage);

    // 重建已有的对话
    addAIMessageNoAnim('对话已恢复，让我们继续。');

    // 重建之前的阶段小结
    for (let s = 0; s < currentStage; s++) {
      const stage = STAGES[s];
      const stageAnswers = stage.questions.map(q => answers[q.key] || '');
      if (stageAnswers.some(Boolean)) {
        addSummaryCard(`${stage.label} · 小结`, createSummary(stage, stageAnswers));
      }
    }

    if (currentQuestion > 0) {
      // 显示当前问题
      askQuestion(currentStage, currentQuestion);
    } else {
      // 刚进入新阶段
      addAIMessage(STAGES[currentStage].transition, () => {
        setTimeout(() => askQuestion(currentStage, 0), 600);
      });
    }
  } else if (reportGenerated) {
    updateProgress(5);
    if (APP_STATE.unlocked) {
      addAIMessageNoAnim('欢迎回来。你的完整天赋定位报告在这里。');
    } else {
      addAIMessageNoAnim('欢迎回来。这是你的天赋定位报告，部分精彩内容已为你展示。');
    }
    const report = buildReport();
    displayReport(report);
  }
}

function addAIMessageNoAnim(text) {
  const el = document.createElement('div');
  el.className = 'msg ai';
  el.textContent = text;
  chatInner.appendChild(el);
  scrollToBottom();
}

// ===== 启动 =====
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
